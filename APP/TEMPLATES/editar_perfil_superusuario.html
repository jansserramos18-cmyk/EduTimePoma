<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/registro_maestro.css') }}">
    <title>Editar Perfil - Superusuario</title>
</head>
<body class="bg-light">
    <div class="container">
        <a href="{{ url_for('dashboard_superusuario') }}" class="btn btn-secondary mb-3">
            <i class="fas fa-arrow-left"></i> Volver al Dashboard
        </a>

        <div class="mt-3">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="alert alert-{{ 'danger' if category == 'danger' else 'success' }} alert-dismissible fade show" role="alert">
                    <strong>{{ message }}</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
                {% endfor %}
            {% endif %}
            {% endwith %}
        </div>

        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-user-shield"></i> Editar Mi Perfil</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre:</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" value="{{ superusuario.p_nombre }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="s_nombre" class="form-label">Segundo Nombre (Opcional):</label>
                        <input type="text" class="form-control" id="s_nombre" name="s_nombre" value="{{ superusuario.s_nombre or '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="apellido_p" class="form-label">Apellido Paterno:</label>
                        <input type="text" class="form-control" id="apellido_p" name="apellido_p" value="{{ superusuario.p_apellido }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="apellido_m" class="form-label">Apellido Materno (Opcional):</label>
                        <input type="text" class="form-control" id="apellido_m" name="apellido_m" value="{{ superusuario.s_apellido or '' }}">
                    </div>

                    <div class="mb-3">
                        <label for="correo" class="form-label">Correo Electrónico:</label>
                        <input type="email" class="form-control" id="correo" name="correo" value="{{ superusuario.correo }}" required>
                    </div>

                    <div class="mb-3">
                        <label for="contraseña_actual" class="form-label">Contraseña Actual:</label>
                        <input type="password" class="form-control" id="contraseña_actual" name="contraseña_actual" required>
                    </div>

                    <div class="mb-3">
                        <label for="nueva_contraseña" class="form-label">Nueva Contraseña (Opcional):</label>
                        <input type="password" class="form-control" id="nueva_contraseña" name="nueva_contraseña">
                    </div>

                    <button type="submit" class="btn btn-primary">Actualizar Perfil</button>
                    <a href="{{ url_for('dashboard_superusuario') }}" class="btn btn-outline-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
