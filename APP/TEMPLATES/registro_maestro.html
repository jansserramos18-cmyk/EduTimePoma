<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registro</title>
</head>
<body>
    <h1>Registrarse como docente</h1>
    <form method="POST" action="{{ url_for('registro_maestro') }}">
        <label>Nombre:</label><br>
        <input type="text" placeholder="Tu nombre" name="nombre"><br><br>

        <label>Segundo nombre:</label><br>
        <input type="text" placeholder="Tu segundo nombre (opcional)" name="s_nombre"><br><br>
        
        <label>Apellido Paterno:</label><br>
        <input type="text" placeholder="Tu apellido" name="apellido_p"><br><br>
        
        <label>Apellido Materno:</label><br>
        <input type="text" placeholder="Tu apellido" name="apellido_m"><br><br>

        <label>Correo electrónico:</label><br>
        <input type="email" placeholder="Tu correo" name="correo"><br><br>

        <label>Contraseña:</label><br>
        <input type="password" placeholder="Tu contraseña" name="contraseña"><br><br>

        <button type="submit">Enviar datos</button>
    </form>

    <p>Al registrarte estás aceptando nuestros <a>términos y condiciones</a>como sitio web</p>
    
    <br>
    <a href="{{ url_for('home') }}">Volver al inicio</a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
